// 🔥 RENDER FUNCTION
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>

<div id="${id}${i}" class="details">
${p.details.map(d=>`<p>• ${d}</p>`).join("")}
</div>
</div>
`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}
