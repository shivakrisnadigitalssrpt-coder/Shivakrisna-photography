<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; background:#fff; padding:20px; text-align:center; }

.card {
  background:#f3f3f3;
  padding:20px;
  margin:20px auto;
  border-radius:15px;
  width:320px;
  text-align:left;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }

.details { display:none; margin-top:10px; font-size:14px; }

.cart { background:#eee; padding:20px; border-radius:15px; margin-top:30px; }

#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>

<h2>💍 Wedding Packages</h2>
<div id="wedding"></div>

<h2>👶 Cradle</h2>
<div id="cradle"></div>

<h2>🎉 Birthday</h2>
<div id="birthday"></div>

<h2>👗 Saree / Dothi</h2>
<div id="saree"></div>

<h2>✨ Customize</h2>
<div id="custom"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()">Checkout</button>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Booking Details</h3>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="location" placeholder="Location"><br>
<input id="bride" placeholder="Bride Date"><br>
<input id="groom" placeholder="Groom Date"><br>
<input id="wed" placeholder="Wedding Date"><br>
<input id="rec" placeholder="Reception Date"><br>

<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// PACKAGES (short for stability)
const wedding=[
{title:"Package 1 ₹49,000",price:49000,details:["Traditional Coverage","50 Sheets"]},
{title:"Package 2 ₹74,999",price:74999,details:["Candid + Cinematic","50 Sheets"]},
{title:"Package 3 ₹1,43,999",price:143999,details:["Drone + LED","80 Sheets"]}
];

const birthday=[
{title:"Basic ₹21,000",price:21000,details:["Traditional + 30 Sheets"]},
{title:"Premium ₹69,999",price:69999,details:["Cinematic"]}
];

const cradle=[
{title:"Basic ₹21,000",price:21000,details:["Traditional"]},
{title:"Premium ₹39,999",price:39999,details:["Candid"]}
];

const saree=[
{title:"Basic ₹21,000",price:21000,details:["Traditional"]},
{title:"Premium ₹1,21,999",price:121999,details:["Full"]}
];

const custom=[
{name:"Album Sheets",price:500},
{name:"Traditional Photography",price:5000},
{name:"Traditional Video",price:7000},
{name:"Drone",price:8000}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${p.details.map(d=>`<p>• ${d}</p>`).join("")}
</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// ADD
function add(name,price){
cart.push({name,price,qty:1});
updateCart();
}

// CUSTOM
function renderCustom(){
let html="";
custom.forEach((c,i)=>{
html+=`
<div class="card">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
<input id="q${i}" value="1">
<button onclick="addCustom(${i})">Add</button>
</div>`;
});
document.getElementById("custom").innerHTML=html;
}

function addCustom(i){
let qty=parseInt(document.getElementById("q"+i).value)||1;
cart.push({name:custom[i].name,price:custom[i].price,qty});
updateCart();
}

// CART
function updateCart(){
let html=""; let total=0;
cart.forEach(c=>{
let sub=c.price*c.qty;
total+=sub;
html+=`<p>${c.name} x ${c.qty} = ₹${sub}</p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// FORM
function openForm(){document.getElementById("formBox").style.display="block";}
function closeForm(){document.getElementById("formBox").style.display="none";}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let cartText="";
cart.forEach(c=>{
cartText+=c.name+" x "+c.qty+" = ₹"+(c.price*c.qty)+"%0A";
});

let msg=`Booking%0AName:${name}%0APhone:${phone}%0ALocation:${location}%0A%0A${cartText}`;

window.open("https://wa.me/919553272893?text="+msg,"_blank");
}

// INIT
render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");
renderCustom();

</script>

</body>
</html>
