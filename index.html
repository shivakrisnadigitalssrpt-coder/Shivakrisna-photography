<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; background:#fff; padding:20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#f3f3f3;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  transition:0.3s;
}
img:hover { transform:scale(1.05); }

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details { display:none; margin-top:10px; }

.cart { background:#eee; padding:20px; border-radius:15px; margin-top:30px; }

#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p style="font-size:18px; color:#555;">📞 Cell :- 9553272893</p>

<h2>📸 Our Work</h2>

<div class="grid">

<img src="https://lh3.googleusercontent.com/d/1cmRlEFSQats6Nzp0-uSj2EU1GYkvhTKM">
<img src="https://lh3.googleusercontent.com/d/1OQo_N9T6Jbm8Q3ZtnGvESflZWj50Ank2">
<img src="https://lh3.googleusercontent.com/d/1tu8tQFpztOqne87OjNJwQKqn_LUwuIT0">
<img src="https://lh3.googleusercontent.com/d/1wQOQhiPr8YDjjGVU1gsTSL8Wzy8JPKWe">
<img src="https://lh3.googleusercontent.com/d/1_MoZ2P2ZaDGynWQyBnv-KopIb6Im3UrZ">
<img src="https://lh3.googleusercontent.com/d/1zKIN9danJ9UcQsNTh91nMqN6GVU3FtIT">

</div>

<h2>💍 Wedding Packages</h2>
<div id="wedding" class="grid"></div>

<h2>👶 Cradle</h2>
<div id="cradle" class="grid"></div>

<h2>🎉 Birthday</h2>
<div id="birthday" class="grid"></div>

<h2>👗 Saree / Dothi</h2>
<div id="saree" class="grid"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()" style="background:#25D366;color:white;">Checkout</button>
</div>

<div id="formBox">
<h3>Client Details</h3>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="location" placeholder="Location"><br>
<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

const wedding = [
{title:"Package 1 ₹49,000",price:49000},
{title:"Package 2 ₹74,999",price:74999},
{title:"Package 3 ₹1,43,999",price:143999},
{title:"Package 4 ₹1,14,999",price:114999},
{title:"Package 5 ₹1,29,999",price:129999},
{title:"Package 6 ₹1,67,999",price:167999},
{title:"Package 7 ₹1,92,999",price:192999},
{title:"Package 8 ₹2,41,999",price:241999},
{title:"Package 9 ₹2,61,999",price:261999},
{title:"Package 10 ₹2,79,999",price:279999}
];

const birthday = [
{title:"Birthday ₹21,000",price:21000},
{title:"Birthday ₹29,999",price:29999},
{title:"Birthday ₹44,999",price:44999},
{title:"Birthday ₹69,999",price:69999}
];

const saree = [
{title:"Saree ₹21,000",price:21000},
{title:"Saree ₹29,999",price:29999},
{title:"Saree ₹44,999",price:44999},
{title:"Saree ₹71,999",price:71999},
{title:"Saree ₹96,999",price:96999},
{title:"Saree ₹1,21,999",price:121999}
];

const cradle = [
{title:"Cradle ₹21,000",price:21000},
{title:"Cradle ₹39,999",price:39999}
];

let cart=[];

function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

function add(name,price){
cart.push({name,price});
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} - ₹${c.price}
<button class="remove-btn" onclick="removeItem(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

function openForm(){document.getElementById("formBox").style.display="block";}
function closeForm(){document.getElementById("formBox").style.display="none";}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let msg=`Name:${name}%0APhone:${phone}%0ALocation:${location}%0A`;

cart.forEach(c=>{
msg+=c.name+" ₹"+c.price+"%0A";
});

window.open("https://wa.me/919553272893?text="+msg);
}

render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");

</script>

</body>
</html>
