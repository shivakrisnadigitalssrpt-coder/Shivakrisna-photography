<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; background:#fff; padding:20px; text-align:center; }
.card {
  background:#f3f3f3;
  padding:20px;
  margin:20px auto;
  border-radius:15px;
  width:320px;
  text-align:left;
}
button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}
.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.details { display:none; margin-top:10px; font-size:14px; }
.cart { background:#eee; padding:20px; border-radius:15px; margin-top:30px; }
#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}
input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>

<h2>💍 Wedding Packages (Starting ₹50,000)</h2>
<div id="wedding"></div>

<h2>👶 Cradle</h2>
<div id="cradle"></div>

<h2>🎉 Birthday</h2>
<div id="birthday"></div>

<h2>👗 Saree / Dothi</h2>
<div id="saree"></div>

<h2>✨ Customize</h2>
<div id="custom"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()">Checkout</button>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Booking Details</h3>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="location" placeholder="Location"><br>
<input id="bride" placeholder="Bride Date"><br>
<input id="groom" placeholder="Groom Date"><br>
<input id="wed" placeholder="Wedding Date"><br>
<input id="rec" placeholder="Reception Date"><br>
<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// 🔥 WEDDING (1–10 FULL)
const wedding = [
{title:"Package 1 ₹49,000",price:49000,details:["Bride:- Traditional Photography & Videography + Groom:- Traditional Photography & Videography + Wedding:-Traditional Photography & Videography","50 Sheets Album"]},
{title:"Package 2 ₹74,999",price:74999,details:["Traditional + Candid + Cinematic, Bride:- Traditional Photography & Videography + Groom:- Traditional Photography & Videography + Wedding:-Traditional Photography & Videography, Cinematic And Candid Photography","50 Sheets"]},
{title:"Package 3 ₹1,43,999",price:143999,details:["Candid + Cinematic + Bride:- Traditional Photography & Videography + Groom:- Traditional Photography & Videography + Wedding:-Traditional Photography & Videography, Cinematic And Candid Photography + Drone + LED","80 Sheets"]},
{title:"Package 4 ₹1,14,999",price:114999,details:["Pre Wedding + Bride:- Traditional Photography & Videography + Groom:- Traditional Photography & Videography + Wedding:-Traditional Photography & Videography, Cinematic And Candid Photography + Drone + LED","80 Sheets Full Coverage","80 Sheets"]},
{title:"Package 5 ₹1,29,999",price:129999,details:[" Pre Wedding Bride:- Traditional Photography & Videography + Groom:- Traditional Photography & Videography + Wedding:-Traditional Photography & Videography, Cinematic And Candid Photography + Drone + LED"," Reception: Traditional Photography & Videography ","80 Sheets"]},
{title:"Package 6 ₹1,67,999",price:167999,details:["Drone + LED + Reception","100 Sheets : Bride:- Pre Wedding :-Candid Photography Cinematic Video And Drone. Traditional Photography And Videography Covarage. Groom:- Traditional Photography And Videography Covarage. Wedding :- Traditional Photography And Videography, Candid And Cinematic Video, LED Screen And Drone. Reciption:- Traditional Photography And Videography, LED Screen And Drone Covarage "]},
{title:"Package 7 ₹1,92,999",price:192999,details:["Cinematic + Candid + Drone","100 Sheets: Pre Wedding :-Candid Photography Cinematic Video And Drone. Traditional Photography And Videography Covarage. Groom:- Traditional Photography And Videography Covarage. Wedding :- Traditional Photography And Videography, Candid And Cinematic Video, LED Screen And Drone. Reciption:- Traditional Photography And Videography, LED Screen And Drone, Cinematic Video And Candid Photography. Covarage  "]},
{title:"Package 8 ₹2,41,999",price:241999,details:["Full Premium","100 Sheets: Bride:-Candid Photography And Cinematic Video, Traditional Photography And Videography Covarage. Groom:- Traditional Photography And Videography, Candid Photography And Cinematic Video Covarage. Wedding :- Traditional Photography And Videography Candid Photography And Cinematic Video, LED Screen And Drone. Reciption:- Traditional Photography And Videography, LED Screen And Drone, Cinematic Video And Candid Photography. Covarage"]},
{title:"Package 9 ₹2,61,999",price:261999,details:["Live Streaming","100 Sheets : Pre Wedding :- Candid Photography Cinematic Video And Drone. Bride:-Candid Photography And Cinematic Video, Traditional Photography And Videography Covarage. Groom:- Traditional Photography And Videography, Candid Photography And Cinematic Video Covarage. Wedding :- Traditional Photography And Videography Candid Photography And Cinematic Video, LED Screen And Drone, Live Stream. Reciption:- Traditional Photography And Videography, LED Screen And Drone, Cinematic Video And Candid Photography. Live Stream. Covarage"]},
{title:"Package 10 ₹2,79,999",price:279999,details:["Engagement, Pre Wedding + Full","100 Sheets Pre Wedding :- Candid Photography Cinematic Video And Drone. Bride:-Candid Photography And Cinematic Video, Traditional Photography And Videography Covarage. Groom:- Traditional Photography And Videography, Candid Photography And Cinematic Video Covarage. Wedding :- Traditional Photography And Videography Candid Photography And Cinematic Video, LED Screen And Drone, Live Stream. Reciption:- Traditional Photography And Videography, LED Screen And Drone, Cinematic Video And Candid Photography. Live Stream. Covarage"]}
];

// 🎉 BIRTHDAY (11–14)
const birthday = [
{title:"Package 11 ₹21,000",price:21000,details:["Traditional + 30 Sheets"]},
{title:"Package 12 ₹29,999",price:29999,details:["Baby Shoot + 30 Sheets"]},
{title:"Package 13 ₹44,999",price:44999,details:["Drone + LED + 30 Sheets"]},
{title:"Package 14 ₹69,999",price:69999,details:["Cinematic + 30 Sheets"]}
];

// 👗 SAREE (15–20)
const saree = [
{title:"Package 15 ₹21,000",price:21000,details:["Traditional"]},
{title:"Package 16 ₹29,999",price:29999,details:["Haldi + Function"]},
{title:"Package 17 ₹44,999",price:44999,details:["Drone + LED"]},
{title:"Package 18 ₹71,999",price:71999,details:["Drone + LED"]},
{title:"Package 19 ₹96,999",price:96999,details:["Candid + Cinematic"]},
{title:"Package 20 ₹1,21,999",price:121999,details:["Full Coverage"]}
];

// 👶 CRADLE (21–22)
const cradle = [
{title:"Package 21 ₹21,000",price:21000,details:["Traditional"]},
{title:"Package 22 ₹39,999",price:39999,details:["Candid + Cinematic"]}
];

// CUSTOM
const custom = [
{name:"Album Sheets",price:500},
{name:"Traditional Photography",price:5000},
{name:"Traditional Video",price:7000},
{name:"Drone",price:8000},
{name:"LED Screen",price:12000},
{name:"Pre Wedding",price:30000},
{name:"Cinematic Video",price:15000},
{name:"Candid Photography",price:10000},
{name:"Baby Shoot",price:25000},
{name:"Half Saree/Dothi",price:28000}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${p.details.map(d=>`<p>• ${d}</p>`).join("")}
</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// ADD
function add(name,price){
cart.push({name,price,qty:1});
updateCart();
}

// CUSTOM
function renderCustom(){
let html="";
custom.forEach((c,i)=>{
html+=`
<div class="card">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
<input id="q${i}" value="1">
<button onclick="addCustom(${i})">Add</button>
</div>`;
});
document.getElementById("custom").innerHTML=html;
}

function addCustom(i){
let qty=parseInt(document.getElementById("q"+i).value)||1;
cart.push({name:custom[i].name,price:custom[i].price,qty});
updateCart();
}

// CART
function updateCart(){
let html=""; let total=0;
cart.forEach(c=>{
let sub=c.price*c.qty;
total+=sub;
html+=`<p>${c.name} x ${c.qty} = ₹${sub}</p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// FORM
function openForm(){document.getElementById("formBox").style.display="block";}
function closeForm(){document.getElementById("formBox").style.display="none";}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let cartText="";
cart.forEach(c=>{
cartText+=c.name+" x "+c.qty+" = ₹"+(c.price*c.qty)+"%0A";
});

let msg=`Booking%0AName:${name}%0APhone:${phone}%0ALocation:${location}%0A%0A${cartText}`;
window.open("https://wa.me/919553272893?text="+msg,"_blank");
}

// INIT
render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");
renderCustom();

</script>

</body>
</html>
