<!DOCTYPE html>
<html>
<head>
  <title>Shivakrisna Photography</title>
  <style>
    body { font-family: Arial; margin: 0; text-align: center; }

    .hero {
      background: black;
      color: white;
      padding: 100px 20px;
    }

    .section { padding: 40px; }

    .gallery img {
      width: 30%;
      margin: 10px;
      border-radius: 10px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>📸 Shivakrisna Photography</h1>
  <p>For bookings & quotations</p>
  <h2>📞 9553272893</h2>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
    <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9">
  </div>
</div>

<!-- PACKAGES -->
<div class="section">
  <h2>Packages</h2>

  <div id="items"></div>
</div>

<!-- CART -->
<div class="section">
  <h2>Your Package</h2>
  <div id="cart"></div>
  <h3 id="total">Total: ₹0</h3>
</div>

<!-- WHATSAPP -->
<div class="section">
  <a id="wa" href="#" target="_blank">
    <button>Send on WhatsApp</button>
  </a>
</div>

<script>
const items = [
  { name: "Album Sheets", price: 500 },
  { name: "Traditional Video", price: 7000 },
  { name: "Drone", price: 8000 },
  { name: "LED Screen", price: 12000 },
  { name: "Pre Wedding", price: 30000 },
  { name: "Cinematic Video", price: 15000 },
  { name: "Candid Photography", price: 10000 }
];

let cart = [];

function renderItems() {
  let html = "";
  items.forEach((item, i) => {
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="add(${i})">Add</button>
      </div>
    `;
  });
  document.getElementById("items").innerHTML = html;
}

function add(i) {
  cart.push({ ...items[i], qty: 1 });
  renderCart();
}

function renderCart() {
  let html = "";
  let total = 0;

  cart.forEach((item) => {
    total += item.price * item.qty;
    html += `<p>${item.name} - ₹${item.price}</p>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;

  document.getElementById("wa").href =
    "https://wa.me/919553272893?text=Total Package Price: ₹" + total;
}

renderItems();
</script>

</body>
</html>
