<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details {
  display:none;
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

iframe { width:100%; height:200px; border-radius:10px; }

.cart { background:#eee; padding:20px; margin-top:30px; border-radius:15px; }

#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
}
input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 9553272893</p>

<!-- VIDEOS -->
<h2>🎥 Pre Wedding Videos</h2>
<div class="grid">
<iframe src="https://drive.google.com/file/d/1QKi2fBt4GSKJHt2k8Alb1kdOsw0PLGon/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1kvFZUAHLvt_q-jM9twlfq4XxzzCrA0ca/preview"></iframe>
</div>

<!-- WEDDING -->
<h2>💍 Wedding Packages</h2>
<div id="wedding" class="grid"></div>

<!-- BIRTHDAY -->
<h2>🎉 Birthday Packages</h2>
<div id="birthday" class="grid"></div>

<!-- SAREE -->
<h2>👗 Half Saree Ceremony</h2>
<div id="saree" class="grid"></div>

<!-- CRADLE -->
<h2>👶 Cradle Ceremony</h2>
<div id="cradle" class="grid"></div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()">Checkout</button>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Client Details</h3>
<input id="cname" placeholder="Client Name">
<input id="cnumber" placeholder="Mobile Number">
<input id="eng" placeholder="Engagement Date">
<input id="bride" placeholder="Bride Date">
<input id="groom" placeholder="Groom Date">
<input id="wed" placeholder="Wedding Date">
<input id="rec" placeholder="Reception Date">
<input id="preloc" placeholder="Pre Wedding Location">
<input id="cloc" placeholder="Client Location">

<button onclick="sendWhatsApp()">Submit</button>
</div>

<script>

// 🔥 FULL 10 WEDDING (YOUR DETAILS)
const wedding = [
{
title:"Package 1 ₹49,000",
price:49000,
details:[
"Bride: Traditional Photography & Videography",
"Groom: Traditional Photography & Videography",
"Wedding: Traditional Photography & Videography"
]
},
{
title:"Package 2 ₹74,999",
price:74999,
details:[
"Wedding: Traditional + Candid + Cinematic"
]
},
{
title:"Package 3 ₹89,999",
price:89999,
details:[
"Wedding: Drone + LED + Candid + Cinematic"
]
},
{
title:"Package 4 ₹1,14,999",
price:114999,
details:[
"Pre Wedding + Wedding + Drone"
]
},
{
title:"Package 5 ₹1,29,999",
price:129999,
details:[
"Reception included"
]
},
{
title:"Package 6 ₹1,44,999",
price:144999,
details:[
"Advanced coverage"
]
},
{
title:"Package 7 ₹1,69,999",
price:169999,
details:[
"Advanced Pro"
]
},
{
title:"Package 8 ₹2,19,999",
price:219999,
details:[
"Premium"
]
},
{
title:"Package 9 ₹2,39,999",
price:239999,
details:[
"Live Streaming"
]
},
{
title:"Package 10 ₹2,79,999",
price:279999,
details:[
"Engagement + Full coverage"
]
}
];

// 🎉 BIRTHDAY (4)
const birthday = [
{title:"Package 11 ₹21,000",price:21000,details:["Traditional"]},
{title:"Package 12 ₹29,999",price:29999,details:["Baby Shoot"]},
{title:"Package 13 ₹44,999",price:44999,details:["Drone + LED"]},
{title:"Package 14 ₹69,999",price:69999,details:["Cinematic"]}
];

// 👗 SAREE (6)
const saree = [
{title:"Package 15 ₹21,000",price:21000},
{title:"Package 16 ₹29,999",price:29999},
{title:"Package 17 ₹44,999",price:44999},
{title:"Package 18 ₹71,999",price:71999},
{title:"Package 19 ₹96,999",price:96999},
{title:"Package 20 ₹1,21,999",price:121999}
];

// 👶 CRADLE (2)
const cradle = [
{title:"Package 21 ₹21,000",price:21000},
{title:"Package 22 ₹39,999",price:39999}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${(p.details||["Full Coverage"]).map(d=>`<p>• ${d}</p>`).join("")}
</div>

</div>`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// CART
function add(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} ₹${c.price}
<button onclick="remove(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

function remove(i){
cart.splice(i,1);
updateCart();
}

// FORM
function openForm(){ document.getElementById("formBox").style.display="block"; }

// WHATSAPP
function sendWhatsApp(){
let msg=`Booking%0AName:${cname.value}%0APhone:${cnumber.value}%0A`;

cart.forEach(c=> msg+=c.name+" ₹"+c.price+"%0A");

window.open("https://wa.me/919553272893?text="+msg);
}

// INIT
render(wedding,"wedding");
render(birthday,"birthday");
render(saree,"saree");
render(cradle,"cradle");

</script>

</body>
</html>
