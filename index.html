<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; margin:0; background:#111; color:white; text-align:center; }
.section { padding:40px; }

.card {
  background:#222;
  margin:10px;
  padding:20px;
  border-radius:10px;
  display:inline-block;
  width:260px;
}

button {
  background:gold;
  border:none;
  padding:8px;
  cursor:pointer;
}

input {
  width:60px;
  margin-top:5px;
}
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<h3>📞 9553272893</h3>

<!-- WEDDING -->
<div class="section">
<h2>💍 Wedding Packages</h2>
<div id="wedding"></div>
</div>

<!-- CUSTOM -->
<div class="section">
<h2>✨ Customize (Sheets & Addons)</h2>
<div id="custom"></div>
</div>

<!-- CART -->
<div class="section">
<h2>🛒 Your Package</h2>
<div id="cart"></div>
<h3 id="total">Total: ₹0</h3>
</div>

<!-- WHATSAPP -->
<div class="section">
<a id="wa" target="_blank">
<button>Send on WhatsApp</button>
</a>
</div>

<script>

// 🔥 YOUR REAL WEDDING PACKAGES
const wedding = [
 {name:"Basic Package", price:49000},
 {name:"Basic to Advance", price:74999},
 {name:"Advance Plus", price:143999},
 {name:"Pro Package", price:114999},
 {name:"Pro Max", price:129999},
 {name:"Advanced", price:167999},
 {name:"Advanced Pro", price:192999},
 {name:"Premium", price:241999},
 {name:"Premium Plus", price:261999},
 {name:"Premium Pro", price:279999}
];

// 🔥 CUSTOM ITEMS
const custom = [
 {name:"Album Sheets", price:500},
 {name:"Traditional Video", price:7000},
 {name:"Drone", price:8000},
 {name:"LED Screen", price:12000},
 {name:"Cinematic Video", price:15000},
 {name:"Candid Photography", price:10000}
];

let cart = [];

// SHOW PACKAGES
function renderWedding(){
 let html="";
 wedding.forEach(p=>{
  html+=`
   <div class="card">
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button onclick="add('${p.name}',${p.price})">Add</button>
   </div>`;
 });
 document.getElementById("wedding").innerHTML=html;
}

// SHOW CUSTOM
function renderCustom(){
 let html="";
 custom.forEach((c,i)=>{
  html+=`
   <div class="card">
    <h3>${c.name}</h3>
    <p>₹${c.price}</p>
    <input type="number" id="q${i}" value="1"/>
    <button onclick="addCustom(${i})">Add</button>
   </div>`;
 });
 document.getElementById("custom").innerHTML=html;
}

// ADD PACKAGE
function add(name,price){
 cart.push({name,price,qty:1});
 update();
}

// ADD CUSTOM
function addCustom(i){
 let qty=document.getElementById("q"+i).value;
 cart.push({name:custom[i].name,price:custom[i].price,qty:qty});
 update();
}

// UPDATE CART
function update(){
 let html="";
 let total=0;

 cart.forEach(c=>{
  let sub=c.price*c.qty;
  total+=sub;
  html+=`<p>${c.name} x ${c.qty} = ₹${sub}</p>`;
 });

 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText="Total: ₹"+total;

 document.getElementById("wa").href =
  "https://wa.me/919553272893?text=Total Package ₹"+total;
}

// INIT
renderWedding();
renderCustom();

</script>

</body>
</html>
