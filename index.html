<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

img, video {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details { display:none; margin-top:10px; background:#fff; padding:10px; border-radius:10px; }

.cart { background:#eee; padding:20px; margin-top:30px; border-radius:15px; }

#popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
#popup img { max-width:90%; max-height:90%; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 Cell :- 9553272893</p>

<!-- GALLERY -->
<h2>📸 Our Work</h2>
<div class="grid">
<img src="https://lh3.googleusercontent.com/d/1cmRlEFSQats6Nzp0-uSj2EU1GYkvhTKM" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1OQo_N9T6Jbm8Q3ZtnGvESflZWj50Ank2" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1tu8tQFpztOqne87OjNJwQKqn_LUwuIT0" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1wQOQhiPr8YDjjGVU1gsTSL8Wzy8JPKWe" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1_MoZ2P2ZaDGynWQyBnv-KopIb6Im3UrZ" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1zKIN9danJ9UcQsNTh91nMqN6GVU3FtIT" onclick="openPopup(this.src)">
</div>

<!-- VIDEOS -->
<h2>🎥 Pre Wedding Videos</h2>
<div class="grid">
<video controls src="https://docs.google.com/uc?export=download&id=1QKi2fBt4GSKJHt2k8Alb1kdOsw0PLGon"></video>
<video controls src="https://docs.google.com/uc?export=download&id=1kvFZUAHLvt_q-jM9twlfq4XxzzCrA0ca"></video>
<video controls src="https://docs.google.com/uc?export=download&id=1DZ_-otx51zycpwmS_RvxRt-SB005ETW2"></video>
<video controls src="https://docs.google.com/uc?export=download&id=1OeTSCW7gwWuurpeRl8wDXxn6SoR_DGWM"></video>
<video controls src="https://docs.google.com/uc?export=download&id=1Sg41jrdtQ_1-9GBjvEVH3kxeU-I1FbmO"></video>
<video controls src="https://docs.google.com/uc?export=download&id=1AucUC3CAyfhtGfONTBXec_oguiiPf1QD"></video>
</div>

<!-- PACKAGES -->
<h2>💍 Wedding Packages</h2>
<div id="wedding" class="grid"></div>

<h2>🎉 Birthday Packages</h2>
<div id="birthday" class="grid"></div>

<h2>👗 Half Saree Ceremony</h2>
<div id="saree" class="grid"></div>

<h2>👶 Cradle Ceremony</h2>
<div id="cradle" class="grid"></div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="checkout()" style="background:#25D366;color:white;">Checkout</button>
</div>

<script>

// 🔥 FULL 22 PACKAGES
const wedding = [
{title:"Package 1 ₹49,000",price:49000},
{title:"Package 2 ₹74,999",price:74999},
{title:"Package 3 ₹89,999",price:89999},
{title:"Package 4 ₹1,14,999",price:114999},
{title:"Package 5 ₹1,29,999",price:129999},
{title:"Package 6 ₹1,67,999",price:167999},
{title:"Package 7 ₹1,92,999",price:192999},
{title:"Package 8 ₹2,41,999",price:241999},
{title:"Package 9 ₹2,61,999",price:261999},
{title:"Package 10 ₹2,79,999",price:279999}
];

const birthday = [
{title:"Basic ₹21,000",price:21000},
{title:"Basic ₹29,999",price:29999},
{title:"Advance ₹44,999",price:44999},
{title:"Premium ₹69,999",price:69999}
];

const saree = [
{title:"Basic ₹21,000",price:21000},
{title:"Basic ₹29,999",price:29999},
{title:"Advance ₹44,999",price:44999},
{title:"Advance ₹71,999",price:71999},
{title:"Advance ₹96,999",price:96999},
{title:"Premium ₹1,21,999",price:121999}
];

const cradle = [
{title:"Basic ₹21,000",price:21000},
{title:"Premium ₹39,999",price:39999}
];

let cart=[];

// RENDER FUNCTION
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add to Cart</button>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// ADD CART
function add(name,price){
cart.push({name,price});
updateCart();
}

// UPDATE CART
function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} - ₹${c.price}
<button onclick="remove(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// REMOVE
function remove(i){
cart.splice(i,1);
updateCart();
}

// CHECKOUT
function checkout(){
let msg="Booking Details:%0A";
cart.forEach(c=> msg+=c.name+" ₹"+c.price+"%0A");
window.open("https://wa.me/919553272893?text="+msg);
}

// ZOOM
function openPopup(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}
function closePopup(){
document.getElementById("popup").style.display="none";
}

// INIT
render(wedding,"wedding");
render(birthday,"birthday");
render(saree,"saree");
render(cradle,"cradle");

</script>

<div id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

</body>
</html>
