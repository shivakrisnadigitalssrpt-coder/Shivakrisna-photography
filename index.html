<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; background:#fff; padding:20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#f3f3f3;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details { display:none; margin-top:10px; font-size:14px; }

.cart { background:#eee; padding:20px; border-radius:15px; margin-top:30px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>

<h2>💍 Wedding Packages (1–10)</h2>
<div id="wedding" class="grid"></div>

<h2>👶 Cradle (21–22)</h2>
<div id="cradle" class="grid"></div>

<h2>🎉 Birthday (11–14)</h2>
<div id="birthday" class="grid"></div>

<h2>👗 Saree / Dothi (15–20)</h2>
<div id="saree" class="grid"></div>

<h2>✨ Customize</h2>
<div id="custom" class="grid"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
</div>

<script>

// 💍 WEDDING (1–10)
const wedding = [
{title:"Package 1 ₹49,000",price:49000,details:["Bride,Groom,Wedding Traditional","50 Sheets"]},
{title:"Package 2 ₹74,999",price:74999,details:["Candid + Cinematic","50 Sheets"]},
{title:"Package 3 ₹1,43,999",price:143999,details:["Drone + LED","80 Sheets"]},
{title:"Package 4 ₹1,14,999",price:114999,details:["Pre Wedding","80 Sheets"]},
{title:"Package 5 ₹1,29,999",price:129999,details:["Reception Included","80 Sheets"]},
{title:"Package 6 ₹1,67,999",price:167999,details:["Drone + LED","100 Sheets"]},
{title:"Package 7 ₹1,92,999",price:192999,details:["Candid + Cinematic","100 Sheets"]},
{title:"Package 8 ₹2,41,999",price:241999,details:["Premium Coverage","100 Sheets"]},
{title:"Package 9 ₹2,61,999",price:261999,details:["Live Streaming","100 Sheets"]},
{title:"Package 10 ₹2,79,999",price:279999,details:["Engagement + Full","100 Sheets"]}
];

// 🎉 BIRTHDAY (11–14)
const birthday = [
{title:"Package 11 ₹21,000",price:21000,details:["Traditional + 30 Sheets"]},
{title:"Package 12 ₹29,999",price:29999,details:["Baby Shoot + 30 Sheets"]},
{title:"Package 13 ₹44,999",price:44999,details:["Drone + LED + 30 Sheets"]},
{title:"Package 14 ₹69,999",price:69999,details:["Cinematic + 30 Sheets"]}
];

// 👗 SAREE (15–20)
const saree = [
{title:"Package 15 ₹21,000",price:21000,details:["Traditional"]},
{title:"Package 16 ₹29,999",price:29999,details:["Haldi + Function"]},
{title:"Package 17 ₹44,999",price:44999,details:["Drone + LED"]},
{title:"Package 18 ₹71,999",price:71999,details:["Drone + LED"]},
{title:"Package 19 ₹96,999",price:96999,details:["Candid + Cinematic"]},
{title:"Package 20 ₹1,21,999",price:121999,details:["Full Coverage"]}
];

// 👶 CRADLE (21–22)
const cradle = [
{title:"Package 21 ₹21,000",price:21000,details:["Traditional"]},
{title:"Package 22 ₹39,999",price:39999,details:["Candid + Cinematic"]}
];

// CUSTOMIZE
const custom = [
{name:"Album Sheets",price:500},
{name:"Traditional Photography",price:5000},
{name:"Traditional Video",price:7000},
{name:"Drone",price:8000},
{name:"LED Screen",price:12000},
{name:"Pre Wedding",price:30000},
{name:"Cinematic Video",price:15000},
{name:"Candid Photography",price:10000},
{name:"Baby Shoot",price:25000},
{name:"Half Saree/Dothi",price:28000}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${p.details.map(d=>`<p>• ${d}</p>`).join("")}
</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// ADD
function add(name,price){
cart.push({name,price});
updateCart();
}

// REMOVE
function removeItem(i){
cart.splice(i,1);
updateCart();
}

// CART
function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} - ₹${c.price}
<button class="remove-btn" onclick="removeItem(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// CUSTOM
function renderCustom(){
let html="";
custom.forEach((c,i)=>{
html+=`
<div class="card">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
<input id="q${i}" value="1">
<button onclick="addCustom(${i})">Add</button>
</div>`;
});
document.getElementById("custom").innerHTML=html;
}

function addCustom(i){
let qty=parseInt(document.getElementById("q"+i).value)||1;
cart.push({name:custom[i].name,price:custom[i].price*qty});
updateCart();
}

// INIT
render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");
renderCustom();

</script>

</body>
</html>
