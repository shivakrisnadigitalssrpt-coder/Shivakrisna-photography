<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details { display:none; margin-top:10px; background:#fff; padding:10px; border-radius:10px; }

.cart { background:#eee; padding:20px; margin-top:30px; border-radius:15px; }

#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 Cell :- 9553272893</p>

<h2>💍 Wedding Packages (Starting ₹50,000)</h2>
<div id="wedding" class="grid"></div>

<h2>👶 Cradle Ceremony</h2>
<div id="cradle" class="grid"></div>

<h2>🎉 Birthday Packages</h2>
<div id="birthday" class="grid"></div>

<h2>👗 Half Saree / Dothi Ceremony</h2>
<div id="saree" class="grid"></div>

<h2>✨ Customize Your Package</h2>
<div id="custom" class="grid"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()" style="background:#25D366;color:white;">Checkout</button>
</div>

<div id="formBox">
<h3>Client Details</h3>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="location" placeholder="Location"><br>
<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// 🔥 WEDDING (EXACT DATA)
const wedding = [
{title:"Package 1 ₹49,000",price:49000,details:["Bride: Traditional","Groom: Traditional","Wedding: Traditional","50 Sheets"]},
{title:"Package 2 ₹74,999",price:74999,details:["Traditional + Candid + Cinematic","50 Sheets"]},
{title:"Package 3 ₹89,999",price:89999,details:["Drone + LED","80 Sheets"]},
{title:"Package 4 ₹1,14,999",price:114999,details:["Pre Wedding + Wedding","80 Sheets"]},
{title:"Package 5 ₹1,29,999",price:129999,details:["Reception Included","80 Sheets"]},
{title:"Package 6 ₹1,67,999",price:167999,details:["Drone + LED + Reception","100 Sheets"]},
{title:"Package 7 ₹1,92,999",price:192999,details:["Candid + Cinematic","100 Sheets"]},
{title:"Package 8 ₹2,41,999",price:241999,details:["Premium Full","100 Sheets"]},
{title:"Package 9 ₹2,61,999",price:261999,details:["Live Streaming","100 Sheets"]},
{title:"Package 10 ₹2,79,999",price:279999,details:["Engagement + Full","100 Sheets"]}
];

// 🎉 BIRTHDAY
const birthday = [
{title:"Basic ₹21,000",price:21000,details:["Traditional + 30 Sheets"]},
{title:"Advance ₹29,999",price:29999,details:["Baby Shoot + 30 Sheets"]},
{title:"Advance+ ₹44,999",price:44999,details:["Drone + LED"]},
{title:"Premium ₹69,999",price:69999,details:["Cinematic + Candid"]}
];

// 👗 SAREE
const saree = [
{title:"Basic ₹21,000",price:21000},
{title:"Basic ₹29,999",price:29999},
{title:"Advance ₹44,999",price:44999},
{title:"Advance ₹71,999",price:71999},
{title:"Advance+ ₹96,999",price:96999},
{title:"Premium ₹1,21,999",price:121999}
];

// 👶 CRADLE
const cradle = [
{title:"Basic ₹21,000",price:21000},
{title:"Premium ₹39,999",price:39999}
];

// CUSTOM
const custom = [
{name:"Album Sheets (₹500)",price:500},
{name:"Traditional Photography (₹5000)",price:5000},
{name:"Traditional Video (₹7000)",price:7000},
{name:"Drone (₹8000)",price:8000},
{name:"LED Screen (₹12000)",price:12000},
{name:"Pre Wedding (₹30000)",price:30000},
{name:"Cinematic Video (₹15000)",price:15000},
{name:"Candid Photography (₹10000)",price:10000},
{name:"Baby Shoot (₹25000)",price:25000},
{name:"Half Saree/Dothi (₹28000)",price:28000}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${(p.details||["Full Coverage"]).map(d=>`<p>• ${d}</p>`).join("")}
</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// ADD
function add(name,price){
cart.push({name,price});
updateCart();
}

// REMOVE
function removeItem(i){
cart.splice(i,1);
updateCart();
}

// CART
function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} - ₹${c.price}
<button class="remove-btn" onclick="removeItem(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// CUSTOM
function renderCustom(){
let html="";
custom.forEach((c,i)=>{
html+=`
<div class="card">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
<input id="q${i}" value="1">
<button onclick="addCustom(${i})">Add</button>
</div>`;
});
document.getElementById("custom").innerHTML=html;
}

function addCustom(i){
let qty=parseInt(document.getElementById("q"+i).value)||1;
cart.push({name:custom[i].name,price:custom[i].price*qty});
updateCart();
}

// FORM
function openForm(){ document.getElementById("formBox").style.display="block"; }
function closeForm(){ document.getElementById("formBox").style.display="none"; }

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let msg=`Name:${name}%0APhone:${phone}%0ALocation:${location}%0A`;

cart.forEach(c=>{
msg+=c.name+" ₹"+c.price+"%0A";
});

window.open("https://wa.me/919553272893?text="+msg);
}

// INIT
render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");
renderCustom();

</script>

</body>
</html>
