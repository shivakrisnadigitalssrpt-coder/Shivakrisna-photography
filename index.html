<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#f3f3f3;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details {
  display:none;
  margin-top:10px;
  font-size:14px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.cart { background:#eee; padding:20px; margin-top:30px; border-radius:15px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 Cell :- 9553272893</p>

<!-- GALLERY -->
<h2>📸 Our Work</h2>
<div class="grid">
<img src="https://lh3.googleusercontent.com/d/1cmRlEFSQats6Nzp0-uSj2EU1GYkvhTKM">
<img src="https://lh3.googleusercontent.com/d/1OQo_N9T6Jbm8Q3ZtnGvESflZWj50Ank2">
<img src="https://lh3.googleusercontent.com/d/1tu8tQFpztOqne87OjNJwQKqn_LUwuIT0">
<img src="https://lh3.googleusercontent.com/d/1wQOQhiPr8YDjjGVU1gsTSL8Wzy8JPKWe">
<img src="https://lh3.googleusercontent.com/d/1_MoZ2P2ZaDGynWQyBnv-KopIb6Im3UrZ">
<img src="https://lh3.googleusercontent.com/d/1zKIN9danJ9UcQsNTh91nMqN6GVU3FtIT">
</div>

<!-- PACKAGES -->
<h2>💍 Wedding Packages</h2>
<div id="wedding" class="grid"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
</div>

<script>

const wedding = [
{
title:"Package 1 (Basic) ₹49,000",
price:49000,
details:[
"Bride: Traditional Photo & Video",
"Groom: Traditional Photo & Video",
"Wedding: Traditional Photo & Video"
]
},
{
title:"Package 2 ₹74,999",
price:74999,
details:[
"Traditional + Candid + Cinematic",
"Full Wedding Coverage"
]
},
{
title:"Package 3 ₹1,43,999",
price:143999,
details:[
"Drone + LED Screen",
"Cinematic + Candid"
]
}
];

let cart=[];

// RENDER
function render(){
let html="";
wedding.forEach((p,i)=>{
html+=`
<div class="card">

<h3>${p.title}</h3>

<button class="details-btn" onclick="toggle(${i})">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="d${i}" class="details">
${p.details.map(d=>`<p>• ${d}</p>`).join("")}
</div>

</div>`;
});

document.getElementById("wedding").innerHTML=html;
}

// TOGGLE DETAILS
function toggle(i){
let el=document.getElementById("d"+i);
el.style.display = el.style.display==="block" ? "none" : "block";
}

// ADD
function add(name,price){
cart.push({name,price});
updateCart();
}

// REMOVE
function removeItem(i){
cart.splice(i,1);
updateCart();
}

// CART
function updateCart(){
let html=""; let total=0;

cart.forEach((c,i)=>{
total+=c.price;
html+=`
<p>${c.name} - ₹${c.price}
<button class="remove-btn" onclick="removeItem(${i})">Remove</button>
</p>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

render();

</script>

</body>
</html>
