<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

iframe {
  width:100%;
  height:200px;
  border-radius:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details {
  display:none;
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.cart {
  background:#eee;
  padding:20px;
  margin-top:30px;
  border-radius:15px;
}

#formBox {
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

input { width:90%; padding:8px; margin:5px; }
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 9553272893</p>

<!-- GALLERY -->
<h2>📸 Our Work</h2>
<div class="grid">
<img src="https://lh3.googleusercontent.com/d/1cmRlEFSQats6Nzp0-uSj2EU1GYkvhTKM">
<img src="https://lh3.googleusercontent.com/d/1OQo_N9T6Jbm8Q3ZtnGvESflZWj50Ank2">
<img src="https://lh3.googleusercontent.com/d/1tu8tQFpztOqne87OjNJwQKqn_LUwuIT0">
<img src="https://lh3.googleusercontent.com/d/1wQOQhiPr8YDjjGVU1gsTSL8Wzy8JPKWe">
<img src="https://lh3.googleusercontent.com/d/1_MoZ2P2ZaDGynWQyBnv-KopIb6Im3UrZ">
<img src="https://lh3.googleusercontent.com/d/1zKIN9danJ9UcQsNTh91nMqN6GVU3FtIT">
</div>

<!-- VIDEOS -->
<h2>🎥 Pre Wedding Videos</h2>
<div class="grid">
<iframe src="https://drive.google.com/file/d/1QKi2fBt4GSKJHt2k8Alb1kdOsw0PLGon/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1kvFZUAHLvt_q-jM9twlfq4XxzzCrA0ca/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1DZ_-otx51zycpwmS_RvxRt-SB005ETW2/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1OeTSCW7gwWuurpeRl8wDXxn6SoR_DGWM/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1Sg41jrdtQ_1-9GBjvEVH3kxeU-I1FbmO/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1AucUC3CAyfhtGfONTBXec_oguiiPf1QD/preview"></iframe>
</div>

<!-- PACKAGES -->
<h2>💍 All 22 Packages</h2>
<div id="packages" class="grid"></div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()" style="background:#25D366;color:white;">Checkout</button>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Client Details</h3>
<input id="cname" placeholder="Client Name">
<input id="cnumber" placeholder="Mobile Number">
<input id="eng" placeholder="Engagement Date">
<input id="bride" placeholder="Bride Date">
<input id="groom" placeholder="Groom Date">
<input id="wed" placeholder="Wedding Date">
<input id="rec" placeholder="Reception Date">
<input id="preloc" placeholder="Pre Wedding Location">
<input id="cloc" placeholder="Client Location">

<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// 22 PACKAGES
const packages = [
{title:"Wedding 1 ₹49,000",price:49000},
{title:"Wedding 2 ₹74,999",price:74999},
{title:"Wedding 3 ₹89,999",price:89999},
{title:"Wedding 4 ₹1,14,999",price:114999},
{title:"Wedding 5 ₹1,29,999",price:129999},
{title:"Wedding 6 ₹1,44,999",price:144999},
{title:"Wedding 7 ₹1,69,999",price:169999},
{title:"Wedding 8 ₹2,19,999",price:219999},
{title:"Wedding 9 ₹2,39,999",price:239999},
{title:"Wedding 10 ₹2,79,999",price:279999},

{title:"Birthday 11 ₹21,000",price:21000},
{title:"Birthday 12 ₹29,999",price:29999},
{title:"Birthday 13 ₹44,999",price:44999},
{title:"Birthday 14 ₹69,999",price:69999},

{title:"Half Saree 15 ₹21,000",price:21000},
{title:"Half Saree 16 ₹29,999",price:29999},
{title:"Half Saree 17 ₹44,999",price:44999},
{title:"Half Saree 18 ₹71,999",price:71999},
{title:"Half Saree 19 ₹96,999",price:96999},
{title:"Half Saree 20 ₹1,21,999",price:121999},

{title:"Cradle 21 ₹21,000",price:21000},
{title:"Cradle 22 ₹39,999",price:39999}
];

let cart=[];

// RENDER
function render(){
let html="";
packages.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>
<button class="add-btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("packages").innerHTML=html;
}

function add(i){
cart.push(packages[i]);
updateCart();
}

function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.title} ₹${c.price}
<button onclick="remove(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

function remove(i){
cart.splice(i,1);
updateCart();
}

function openForm(){ document.getElementById("formBox").style.display="block"; }
function closeForm(){ document.getElementById("formBox").style.display="none"; }

function sendWhatsApp(){
let msg=`Booking%0AName:${cname.value}%0APhone:${cnumber.value}%0A`;
cart.forEach(c=> msg+=c.title+"%0A");
window.open("https://wa.me/919553272893?text="+msg);
}

render();

</script>

</body>
</html>
