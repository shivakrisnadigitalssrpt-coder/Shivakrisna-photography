<!DOCTYPE html>
<html>
<head>
  <title>Shivakrisna Photography</title>

  <style>
    body {
      font-family: Arial;
      background: #fafafa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }

    .details-btn {
      background: #333;
      color: #fff;
    }

    .add-btn {
      background: #28a745;
      color: white;
    }

    .remove-btn {
      background: red;
      color: white;
    }

    .details {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 10px;
    }

    #cart {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>📸 Shivakrisna Photography</h1>

<div id="packages"></div>

<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total"></h3>

<script>

const packages = [
  {
    title: "Package 1 (Basic)",
    price: 49000,
    sheets: 50,
    details: [
      "Bride: Traditional Photo & Video",
      "Groom: Traditional Photo & Video",
      "Wedding: Traditional Photo & Video"
    ]
  },
  {
    title: "Package 2 (Advance)",
    price: 74999,
    sheets: 50,
    details: [
      "Wedding: Traditional + Candid + Cinematic"
    ]
  },
  {
    title: "Package 3 (Premium)",
    price: 89999,
    sheets: 80,
    details: [
      "Wedding: Full Premium Coverage + Drone + LED"
    ]
  }
];

let cart = [];

function renderPackages(){
  const container = document.getElementById("packages");
  container.innerHTML = "";

  packages.forEach((pkg, i)=>{
    container.innerHTML += `
      <div class="card">
        <h3>${pkg.title}</h3>
        <p><b>Price:</b> ₹${pkg.price}</p>
        <p><b>Sheets:</b> ${pkg.sheets}</p>

        <button class="details-btn" onclick="toggleDetails(${i})">Details</button>
        <button class="add-btn" onclick="addToCart(${i})">Add</button>

        <div id="details-${i}" class="details">
          ${pkg.details.map(d=>`<p>✔ ${d}</p>`).join("")}
        </div>
      </div>
    `;
  });
}

function toggleDetails(i){
  const el = document.getElementById("details-"+i);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function addToCart(i){
  cart.push(packages[i]);
  renderCart();
}

function removeFromCart(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  const c = document.getElementById("cart");
  c.innerHTML = "";
  let total = 0;

  cart.forEach((item,index)=>{
    c.innerHTML += `
      <div class="cart-item">
        <span>${item.title} - ₹${item.price}</span>
        <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
      </div>
    `;
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: ₹"+total;
}

renderPackages();

</script>

</body>
</html>
