<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
img:hover { transform:scale(1.05); }

iframe {
  width:100%;
  height:200px;
  border-radius:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.details-btn { background:#c89b1d; color:white; }
.add-btn { background:green; color:white; }
.remove-btn { background:red; color:white; }

.details {
  display:none;
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.cart {
  background:#eee;
  padding:20px;
  margin-top:30px;
  border-radius:15px;
}

/* ZOOM */
#popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
#popup img {
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<p>📞 9553272893</p>

<!-- 📸 GALLERY BACK -->
<h2>📸 Our Work</h2>
<div class="grid">

<img src="https://lh3.googleusercontent.com/d/1cmRlEFSQats6Nzp0-uSj2EU1GYkvhTKM" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1OQo_N9T6Jbm8Q3ZtnGvESflZWj50Ank2" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1tu8tQFpztOqne87OjNJwQKqn_LUwuIT0" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1wQOQhiPr8YDjjGVU1gsTSL8Wzy8JPKWe" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1_MoZ2P2ZaDGynWQyBnv-KopIb6Im3UrZ" onclick="openPopup(this.src)">
<img src="https://lh3.googleusercontent.com/d/1zKIN9danJ9UcQsNTh91nMqN6GVU3FtIT" onclick="openPopup(this.src)">

</div>

<!-- 🎥 VIDEOS -->
<h2>🎥 Pre Wedding Videos</h2>
<div class="grid">

<iframe src="https://drive.google.com/file/d/1QKi2fBt4GSKJHt2k8Alb1kdOsw0PLGon/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1kvFZUAHLvt_q-jM9twlfq4XxzzCrA0ca/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1DZ_-otx51zycpwmS_RvxRt-SB005ETW2/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1OeTSCW7gwWuurpeRl8wDXxn6SoR_DGWM/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1Sg41jrdtQ_1-9GBjvEVH3kxeU-I1FbmO/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1AucUC3CAyfhtGfONTBXec_oguiiPf1QD/preview"></iframe>

</div>

<!-- 💍 WEDDING -->
<h2>💍 Wedding Packages</h2>
<div id="wedding" class="grid"></div>

<!-- 🎉 BIRTHDAY -->
<h2>🎉 Birthday Packages</h2>
<div id="birthday" class="grid"></div>

<!-- 👗 SAREE -->
<h2>👗 Half Saree Ceremony</h2>
<div id="saree" class="grid"></div>

<!-- 👶 CRADLE -->
<h2>👶 Cradle Ceremony</h2>
<div id="cradle" class="grid"></div>

<!-- 🛒 CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="checkout()" style="background:#25D366;color:white;">Checkout</button>
</div>

<script>

// DATA SAME
const wedding = [
{title:"Package 1 ₹49,000",price:49000,details:["Traditional","50 Sheets"]},
{title:"Package 2 ₹74,999",price:74999,details:["Candid","50 Sheets"]},
{title:"Package 3 ₹89,999",price:89999,details:["Drone","80 Sheets"]},
{title:"Package 4 ₹1,14,999",price:114999,details:["Pre Wedding","80 Sheets"]},
{title:"Package 5 ₹1,29,999",price:129999,details:["Reception","80 Sheets"]},
{title:"Package 6 ₹1,67,999",price:167999,details:["Drone","100 Sheets"]},
{title:"Package 7 ₹1,92,999",price:192999,details:["Cinematic","100 Sheets"]},
{title:"Package 8 ₹2,41,999",price:241999,details:["Premium","100 Sheets"]},
{title:"Package 9 ₹2,61,999",price:261999,details:["Live","100 Sheets"]},
{title:"Package 10 ₹2,79,999",price:279999,details:["Full","100 Sheets"]}
];

const birthday = [
{title:"21k",price:21000,details:["Basic"]},
{title:"29k",price:29999,details:["Baby"]},
{title:"44k",price:44999,details:["Drone"]},
{title:"69k",price:69999,details:["Premium"]}
];

const saree = [
{title:"21k",price:21000},
{title:"29k",price:29999},
{title:"44k",price:44999},
{title:"71k",price:71999},
{title:"96k",price:96999},
{title:"121k",price:121999}
];

const cradle = [
{title:"21k",price:21000},
{title:"39k",price:39999}
];

let cart=[];

function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.title}</h3>
<button class="details-btn" onclick="toggle('${id}${i}')">Details</button>
<button class="add-btn" onclick="add('${p.title}',${p.price})">Add</button>

<div id="${id}${i}" class="details">
${(p.details||["Full"]).map(d=>`<p>• ${d}</p>`).join("")}
</div>

</div>`;
});
document.getElementById(id).innerHTML=html;
}

function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

function add(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let html=""; let total=0;
cart.forEach((c,i)=>{
total+=c.price;
html+=`<p>${c.name} ₹${c.price}
<button onclick="remove(${i})">Remove</button></p>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

function remove(i){
cart.splice(i,1);
updateCart();
}

function checkout(){
let msg="Booking:%0A";
cart.forEach(c=> msg+=c.name+" ₹"+c.price+"%0A");
window.open("https://wa.me/919553272893?text="+msg);
}

// ZOOM
function openPopup(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}
function closePopup(){
document.getElementById("popup").style.display="none";
}

render(wedding,"wedding");
render(birthday,"birthday");
render(saree,"saree");
render(cradle,"cradle");

</script>

<div id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

</body>
</html>
