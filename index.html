<!DOCTYPE html>
<html>
<head>
<title>Shivakrisna Photography</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background:#fafafa;
  color:#111;
  text-align:center;
}

h1 {color:#b8860b;}

.section { padding:40px; }

.card {
  background:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
  display:inline-block;
  width:320px;
  text-align:left;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
  background:#b8860b;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.details {
  display:none;
  margin-top:10px;
  font-size:14px;
  color:#333;
}

/* FORM */
#formBox {
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:15px;
width:320px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
z-index:999;
}
</style>

</head>

<body>

<h1>📸 Shivakrisna Photography</h1>
<h3>📞 9553272893</h3>

<div class="section"><h2>💍 Wedding Packages (Starting ₹50,000)</h2><div id="wedding"></div></div>
<div class="section"><h2>👶 Cradle Ceremony Packages</h2><div id="cradle"></div></div>
<div class="section"><h2>🎉 Birthday Packages</h2><div id="birthday"></div></div>
<div class="section"><h2>👗 Saree / Dothi Ceremony Packages</h2><div id="saree"></div></div>
<div class="section"><h2>✨ Customize Your Package</h2><div id="custom"></div></div>

<div class="section">
<h2>🛒 Your Package</h2>
<div id="cart"></div>
<h3 id="total">Total ₹0</h3>
<button onclick="openForm()">Checkout</button>
</div>

<!-- FORM -->
<div id="formBox">
<h3>Booking Details</h3>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Mobile"><br><br>
<input id="location" placeholder="Location"><br><br>

<input id="bride" placeholder="Bride Date"><br><br>
<input id="groom" placeholder="Groom Date"><br><br>
<input id="wed" placeholder="Wedding Date"><br><br>
<input id="rec" placeholder="Reception Date"><br><br>

<button onclick="sendWhatsApp()">Submit</button>
<button onclick="closeForm()">Close</button>
</div>

<script>

// 🔥 FULL 22 PACKAGES (CLEANED + EXACT)

// WEDDING (1–10)
const wedding = [
{name:"Package 1 Basic",price:49000,detail:"50 Sheets",full:"Bride + Groom + Wedding Traditional Coverage"},
{name:"Package 2 Basic to Advance",price:74999,detail:"50 Sheets",full:"Traditional + Candid + Cinematic"},
{name:"Package 3 Advance Plus",price:143999,detail:"80 Sheets",full:"LED + Drone + Cinematic"},
{name:"Package 4 Advance Pro",price:114999,detail:"80 Sheets",full:"Pre Wedding + Full Coverage"},
{name:"Package 5 Pro Max",price:129999,detail:"80 Sheets",full:"Reception Included"},
{name:"Package 6 Advanced",price:167999,detail:"100 Sheets",full:"LED + Drone + Reception"},
{name:"Package 7 Advanced Pro",price:192999,detail:"100 Sheets",full:"Candid + Cinematic + Drone"},
{name:"Package 8 Premium",price:241999,detail:"100 Sheets",full:"Full Premium Coverage"},
{name:"Package 9 Premium+",price:261999,detail:"100 Sheets",full:"Live Streaming Included"},
{name:"Package 10 Premium Pro",price:279999,detail:"100 Sheets",full:"Engagement + Full Coverage"}
];

// BIRTHDAY (11–14)
const birthday = [
{name:"Basic",price:21000,detail:"30 Sheets",full:"Traditional Coverage"},
{name:"Basic to Advance",price:29999,detail:"30 Sheets",full:"Baby Shoot Included"},
{name:"Advance",price:44999,detail:"30 Sheets",full:"LED + Drone"},
{name:"Premium",price:69999,detail:"30 Sheets",full:"Candid + Cinematic"}
];

// CRADLE (21–22)
const cradle = [
{name:"Basic",price:21000,detail:"30 Sheets",full:"Traditional"},
{name:"Premium",price:39999,detail:"30 Sheets",full:"Candid + Cinematic"}
];

// SAREE (15–20)
const saree = [
{name:"Basic",price:21000,detail:"30 Sheets",full:"Traditional"},
{name:"Basic",price:29999,detail:"30 Sheets",full:"Haldi + Function"},
{name:"Basic to Advance",price:44999,detail:"30 Sheets",full:"LED + Drone"},
{name:"Advance",price:71999,detail:"50 Sheets",full:"LED + Drone"},
{name:"Advance Plus",price:96999,detail:"50 Sheets",full:"Candid + Cinematic"},
{name:"Premium",price:121999,detail:"50 Sheets",full:"Full Coverage"}
];

// CUSTOM
const custom = [
{name:"Album Sheets (₹500)",price:500},
{name:"Traditional Photography (₹5000)",price:5000},
{name:"Traditional Video (₹7000)",price:7000},
{name:"Drone (₹8000)",price:8000},
{name:"LED Screen (₹12000)",price:12000},
{name:"Pre Wedding Shoot (₹30000)",price:30000},
{name:"Cinematic Video (₹15000)",price:15000},
{name:"Candid Photography (₹10000)",price:10000},
{name:"Baby Shoot (₹25000)",price:25000},
{name:"Half Saree/Dothi (₹28000)",price:28000}
];

let cart=[];

// RENDER
function render(list,id){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>${p.detail}</p>

<button onclick="toggle('${id}${i}')">Details</button>
<button onclick="add('${p.name}',${p.price})">Add</button>

<div id="${id}${i}" class="details">${p.full}</div>
</div>`;
});
document.getElementById(id).innerHTML=html;
}

function renderCustom(){
let html="";
custom.forEach((c,i)=>{
html+=`
<div class="card">
<h3>${c.name}</h3>
<p>₹${c.price}</p>
<input id="q${i}" value="1">
<button onclick="addCustom(${i})">Add</button>
</div>`;
});
document.getElementById("custom").innerHTML=html;
}

// LOGIC
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none" : "block";
}

function add(name,price){
cart.push({name,price,qty:1});
update();
}

function addCustom(i){
let qty=document.getElementById("q"+i).value;
cart.push({name:custom[i].name,price:custom[i].price,qty:qty});
update();
}

function update(){
let html=""; let total=0;

cart.forEach(c=>{
let sub=c.price*c.qty;
total+=sub;
html+=`<p>${c.name} x ${c.qty} = ₹${sub}</p>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total ₹"+total;
}

// FORM
function openForm(){document.getElementById("formBox").style.display="block";}
function closeForm(){document.getElementById("formBox").style.display="none";}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let msg=`Booking Details%0AName:${name}%0APhone:${phone}%0ALocation:${location}`;
window.open("https://wa.me/919553272893?text="+msg,"_blank");
}

// INIT
render(wedding,"wedding");
render(cradle,"cradle");
render(birthday,"birthday");
render(saree,"saree");
renderCustom();

</script>

</body>
</html>
