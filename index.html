<!DOCTYPE html>
<html>
<head>
  <title>Shivakrisna Photography</title>

  <style>
    body {
      font-family: Arial;
      background: #ffffff;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #f3f3f3;
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      width: 300px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
    }

    .details-btn {
      background: #c89b1d;
      color: white;
    }

    .add-btn {
      background: green;
      color: white;
    }

    .details {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Shivakrisna Photography</h1>

<div id="packages"></div>

<script>

const packages = [
  {
    title: "Package 1 (Basic)",
    price: "₹49,000",
    sheets: "50 Sheets",
    details: [
      "Bride: Traditional Photography & Videography",
      "Groom: Traditional Photography & Videography",
      "Wedding: Traditional Photography & Videography"
    ]
  },
  {
    title: "Package 2 (Basic To Advance)",
    price: "₹74,999",
    sheets: "50 Sheets",
    details: [
      "Wedding: Traditional + Candid + Cinematic"
    ]
  },
  {
    title: "Package 3 (Premium)",
    price: "₹89,999",
    sheets: "80 Sheets",
    details: [
      "Wedding: Drone + LED + Cinematic"
    ]
  }
];

const container = document.getElementById("packages");

packages.forEach((pkg, index) => {

  container.innerHTML += `
    <div class="card">
      <h3>${pkg.title}</h3>
      <p>${pkg.price}</p>
      <p>${pkg.sheets}</p>

      <button class="details-btn" onclick="toggle(${index})">
        Details
      </button>

      <button class="add-btn">
        Add
      </button>

      <div id="d${index}" class="details">
        ${pkg.details.map(d => `<p>${d}</p>`).join("")}
      </div>
    </div>
  `;
});

function toggle(i){
  const el = document.getElementById("d"+i);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
